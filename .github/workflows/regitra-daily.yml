name: Regitra Daily Check

on:
  schedule:
    # 07:00 Europe/Vilnius is either 04:00 UTC (summer) or 05:00 UTC (winter).
    - cron: '0 4,5 * * *'
  workflow_dispatch:

jobs:
  run-check-cloud:
    if: vars.USE_SELF_HOSTED != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Ensure run happens at 07:00 Europe/Vilnius
        id: run_window
        run: |
          hour=$(TZ='Europe/Vilnius' date +%H)
          if [ "$hour" = "07" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run checker
        if: steps.run_window.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          REGITRA_PLATE_NUMBER: ${{ secrets.REGITRA_PLATE_NUMBER }}
          REGITRA_REG_CERT_NUMBER: ${{ secrets.REGITRA_REG_CERT_NUMBER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_ATTEMPTS: '3'
        run: node src/checkRegitra.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regitra-check-artifacts
          path: artifacts
          if-no-files-found: ignore

      - name: Add summary
        if: steps.run_window.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -f artifacts/result.json ]; then
            node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('artifacts/result.json','utf8')); const s=r.statuses || {}; const out = [
              '## Regitra status',
              '',
              '- Draudimas galioja: ' + (s.draudimasGalioja || 'NERASTA'),
              '- Leidimas dalyvauti eisme: ' + (s.leidimasDalyvautiEisme || 'NERASTA'),
              '- Technikine: ' + (s.technikine || 'NERASTA'),
              '',
              '_Checked at: ' + (r.checkedAt || 'n/a') + '_'
            ].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);"
          else
            echo "Run did not produce artifacts/result.json" >> "$GITHUB_STEP_SUMMARY"
          fi

  run-check-self-hosted:
    if: vars.USE_SELF_HOSTED == 'true'
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Ensure run happens at 07:00 Europe/Vilnius
        id: run_window
        run: |
          hour=$(TZ='Europe/Vilnius' date +%H)
          if [ "$hour" = "07" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run checker
        if: steps.run_window.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          REGITRA_PLATE_NUMBER: ${{ secrets.REGITRA_PLATE_NUMBER }}
          REGITRA_REG_CERT_NUMBER: ${{ secrets.REGITRA_REG_CERT_NUMBER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_ATTEMPTS: '3'
        run: node src/checkRegitra.js

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regitra-check-artifacts-self-hosted
          path: artifacts
          if-no-files-found: ignore

      - name: Add summary
        if: steps.run_window.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -f artifacts/result.json ]; then
            node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('artifacts/result.json','utf8')); const s=r.statuses || {}; const out = [
              '## Regitra status',
              '',
              '- Draudimas galioja: ' + (s.draudimasGalioja || 'NERASTA'),
              '- Leidimas dalyvauti eisme: ' + (s.leidimasDalyvautiEisme || 'NERASTA'),
              '- Technikine: ' + (s.technikine || 'NERASTA'),
              '',
              '_Checked at: ' + (r.checkedAt || 'n/a') + '_'
            ].join('\n'); fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);"
          else
            echo "Run did not produce artifacts/result.json" >> "$GITHUB_STEP_SUMMARY"
          fi
